<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Happy Birthday, NATT!</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    /* CSS VARIABLES & RESET */
    :root {
      --bg: #0a0a0a;
      --bg-2: #121212;
      --bg-3: #1b1b1b;
      --text: #f5f5f5;
      --muted: #b8b8b8;
      --pink: #ff2a9d;
      --purple: #b347ff;
      --gold: #ffd700;
      --cyan: #00e5ff;
      --radius: 18px;
      --shadow: 0 10px 40px rgba(0,0,0,0.55);
      --glow-pink: 0 0 25px rgba(255,42,157,0.55);
      --glow-purple: 0 0 25px rgba(179,71,255,0.55);
      --glow-gold: 0 0 25px rgba(255,215,0,0.45);
      --transition: 0.25s ease;
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      overflow-x: hidden;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    :focus-visible {
      outline: 3px solid var(--gold);
      outline-offset: 3px;
      border-radius: 6px;
    }

    /* CONFETTI LAYER */
    #confetti-layer {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 100;
      overflow: hidden;
    }

    .confetti {
      position: absolute;
      width: 10px;
      height: 10px;
      opacity: 0.9;
      top: -20px;
      will-change: transform, opacity;
    }

    @keyframes fall {
      0% { transform: translateY(0) rotate(0deg); opacity: 1; }
      100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
    }

    @media (prefers-reduced-motion: reduce) {
      .confetti { display: none !important; }
      html { scroll-behavior: auto; }
    }

    /* LAYOUT */
    .section {
      width: 100%;
      max-width: 1200px;
      margin: 0 auto;
      padding: 56px 20px;
    }

    .section-title {
      font-family: 'Dancing Script', cursive;
      font-size: clamp(3rem, 8vw, 5.5rem);
      text-align: center;
      margin-bottom: 40px;
      background: linear-gradient(90deg, var(--pink), var(--purple), var(--gold));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-shadow: 0 0 40px rgba(255,42,157,0.25);
    }

    /* HERO */
    .hero {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      position: relative;
      padding: 60px 24px;
    }

    .hero-prelude {
      font-family: 'Dancing Script', cursive;
      font-size: clamp(1.4rem, 4vw, 2rem);
      color: var(--cyan);
      text-shadow: 0 0 18px rgba(0,229,255,0.45);
      margin-bottom: 16px;
      opacity: 0.95;
      letter-spacing: 0.02em;
    }

    .hero h1 {
      font-family: 'Dancing Script', cursive;
      font-size: clamp(3.8rem, 13vw, 9rem);
      line-height: 0.95;
      color: #fff;
      text-shadow: var(--glow-pink), 0 0 70px rgba(179,71,255,0.35);
      margin-bottom: 26px;
    }

    .hero-subline {
      font-size: clamp(1.15rem, 3vw, 1.7rem);
      font-weight: 600;
      color: var(--gold);
      text-shadow: 0 0 18px rgba(255,215,0,0.35);
      letter-spacing: 0.04em;
      max-width: 720px;
    }

    .scroll-hint {
      position: absolute;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%);
      color: var(--muted);
      font-size: 0.85rem;
      animation: bounce 2s infinite;
    }

    @keyframes bounce {
      0%, 20%, 50%, 80%, 100% { transform: translateX(-50%) translateY(0); }
      40% { transform: translateX(-50%) translateY(-12px); }
      60% { transform: translateX(-50%) translateY(-6px); }
    }

    @media (prefers-reduced-motion: reduce) {
      .scroll-hint { animation: none; }
    }

    /* COUNTDOWN */
    .countdown-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      max-width: 720px;
      margin: 0 auto 30px;
    }

    .count-card {
      background: linear-gradient(145deg, var(--bg-2), var(--bg-3));
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: var(--radius);
      padding: 24px 12px;
      text-align: center;
      box-shadow: var(--shadow);
      transition: transform var(--transition), box-shadow var(--transition);
    }

    .count-card:hover {
      transform: translateY(-6px);
      box-shadow: var(--glow-purple), var(--shadow);
    }

    .count-card .number {
      font-family: 'Dancing Script', cursive;
      font-size: clamp(2.5rem, 7vw, 4.5rem);
      color: var(--gold);
      text-shadow: var(--glow-gold);
      line-height: 1;
      display: block;
    }

    .count-card .label {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--muted);
      margin-top: 8px;
      font-weight: 600;
    }

    .countdown-date {
      text-align: center;
      color: var(--muted);
      font-size: 1rem;
    }

    .birthday-message {
      text-align: center;
      font-family: 'Dancing Script', cursive;
      font-size: clamp(3.5rem, 10vw, 7rem);
      color: var(--pink);
      text-shadow: var(--glow-pink);
      animation: pulse 1.5s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.03); }
    }

    @media (prefers-reduced-motion: reduce) {
      .birthday-message { animation: none; }
    }

    @media (max-width: 480px) {
      .countdown-grid { gap: 10px; }
      .count-card { padding: 18px 8px; }
    }

    /* PHOTO GRID */
    .photo-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 16px;
    }

    .photo-tile {
      aspect-ratio: 1 / 1;
      background: var(--bg-2);
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: var(--shadow);
      transition: transform var(--transition), box-shadow var(--transition);
    }

    .photo-tile:hover {
      transform: scale(1.02) translateY(-4px);
      box-shadow: var(--glow-purple), var(--shadow);
    }

    .photo-tile img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .photo-placeholder {
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 20px;
      border: 2px dashed rgba(255,255,255,0.15);
      color: var(--muted);
      font-size: 0.95rem;
    }

    /* NATTOK FEED */
    .nattok-wrapper {
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px 0;
    }

    .phone-frame {
      width: min(100%, 420px);
      max-height: 80vh;
      aspect-ratio: 9 / 16;
      background: #000;
      border-radius: 32px;
      box-shadow: 0 0 0 8px #1a1a1a, 0 20px 60px rgba(0,0,0,0.7), var(--glow-pink);
      overflow: hidden;
      position: relative;
      display: flex;
      flex-direction: column;
    }

    .phone-notch {
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 120px;
      height: 22px;
      background: #1a1a1a;
      border-radius: 0 0 14px 14px;
      z-index: 10;
    }

    .video-feed {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      scroll-snap-type: y mandatory;
      scroll-behavior: smooth;
      position: relative;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }

    .video-feed::-webkit-scrollbar { display: none; }

    .video-slide {
      width: 100%;
      height: 100%;
      scroll-snap-align: start;
      scroll-snap-stop: always;
      position: relative;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
    }

    .video-slide video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      cursor: pointer;
    }

    .video-caption {
      position: absolute;
      bottom: 34px;
      left: 16px;
      right: 56px;
      color: #fff;
      font-size: 0.95rem;
      font-weight: 600;
      text-shadow: 0 2px 10px rgba(0,0,0,0.8);
      z-index: 5;
      pointer-events: none;
      line-height: 1.4;
    }

    .mute-badge {
      position: absolute;
      top: 42px;
      right: 16px;
      background: rgba(0,0,0,0.55);
      color: #fff;
      padding: 6px 12px;
      border-radius: 999px;
      font-size: 0.75rem;
      font-weight: 600;
      z-index: 5;
      pointer-events: none;
      backdrop-filter: blur(4px);
    }

    .nattok-placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 30px;
      color: var(--muted);
    }

    .nattok-placeholder strong { color: var(--gold); }

    /* SOCIALS */
    .social-pills {
      display: flex;
      justify-content: center;
      gap: 16px;
      flex-wrap: wrap;
      margin-bottom: 42px;
    }

    .social-pill {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 14px 26px;
      border-radius: 999px;
      font-weight: 700;
      font-size: 1rem;
      transition: transform var(--transition), box-shadow var(--transition);
    }

    .social-pill:hover { transform: translateY(-3px); }

    .social-pill.instagram {
      background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);
      box-shadow: 0 6px 20px rgba(220,39,67,0.35);
    }

    .social-pill.tiktok {
      background: linear-gradient(90deg, #00f2ea, #ff0050);
      box-shadow: 0 6px 20px rgba(255,0,80,0.35);
    }

    .social-pill svg {
      width: 20px;
      height: 20px;
      fill: currentColor;
    }

    .embed-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 28px;
      justify-items: center;
    }

    .embed-note {
      grid-column: 1 / -1;
      text-align: center;
      color: var(--muted);
      border: 2px dashed rgba(255,255,255,0.15);
      border-radius: var(--radius);
      padding: 40px 30px;
    }

    .embed-note strong { color: var(--gold); }

    /* RESPONSIVE */
    @media (max-width: 640px) {
      .section { padding: 44px 16px; }
      .hero { min-height: 92vh; }
    }
  </style>
</head>
<body>

  <div id="confetti-layer" aria-hidden="true"></div>

  <header class="hero" id="hero">
    <div class="hero-prelude">sorry its a day late</div>
    <h1 id="hero-headline">Happy Birthday, NATT!</h1>
    <div class="hero-subline">everyone deserves a birthday present</div>
    <div class="scroll-hint">Scroll down ↓</div>
  </header>

  <main>
    <section class="section" id="countdown" aria-label="Countdown">
      <h2 class="section-title">Next Birthday</h2>
      <div id="countdown-content">
        <div class="countdown-grid">
          <div class="count-card"><span class="number" id="days">00</span><span class="label">Days</span></div>
          <div class="count-card"><span class="number" id="hours">00</span><span class="label">Hours</span></div>
          <div class="count-card"><span class="number" id="minutes">00</span><span class="label">Minutes</span></div>
          <div class="count-card"><span class="number" id="seconds">00</span><span class="label">Seconds</span></div>
        </div>
        <p class="countdown-date" id="countdown-date">Counting down to July 7, 2027</p>
      </div>
    </section>

    <section class="section" id="photos" aria-label="Photos">
      <h2 class="section-title">Her Day 1's</h2>
      <div class="photo-grid" id="photo-grid"></div>
    </section>

    <section class="section" id="nattok" aria-label="NATTOK">
      <h2 class="section-title">NATTOK</h2>
      <div class="nattok-wrapper">
        <div class="phone-frame">
          <div class="phone-notch" aria-hidden="true"></div>
          <div class="video-feed" id="video-feed"></div>
        </div>
      </div>
    </section>

    <section class="section" id="socials" aria-label="Socials">
      <h2 class="section-title">Follow Her</h2>
      <div class="social-pills" id="social-pills"></div>
      <div class="embed-grid" id="embed-grid"></div>
    </section>
  </main>

  <script>
    /* =========================================================
       CONFIG BLOCK — edit everything below this block only
       ========================================================= */
    const CONFIG = {
      // Her name (used in the hero headline and page title)
      name: 'NATT',

      // Social handles (used in the pill buttons)
      instagramHandle: 'INSTAGRAM HANDLE',
      tiktokHandle: 'TIKTOK HANDLE',

      // Photo filenames — add the matching files to the repo root, then list them here
      // e.g. ['photo1.jpg', 'photo2.jpg', 'photo3.jpg']
      photos: [],

      // NATTOK vertical videos — each item: { file: 'video.mp4', caption: '...' }
      // Add the matching .mp4 files to the repo root, then list them here
      nattokVideos: [],

      // Instagram post URLs to embed via the official Instagram embed
      // e.g. ['https://www.instagram.com/p/ABC123/']
      instagramPosts: [],

      // TikTok post URLs to embed via the official TikTok embed
      // e.g. ['https://www.tiktok.com/@handle/video/1234567890']
      tiktokPosts: []
    };
    /* =========================================================
       END CONFIG BLOCK
       ========================================================= */

    /* ---------- Helpers ---------- */
    const $ = (sel, root = document) => root.querySelector(sel);
    const $$ = (sel, root = document) => Array.from(root.querySelectorAll(sel));

    /* ---------- Personalize ---------- */
    document.title = `Happy Birthday, ${CONFIG.name}!`;
    $('#hero-headline').textContent = `Happy Birthday, ${CONFIG.name}!`;

    /* ---------- Confetti ---------- */
    function createConfetti() {
      const prefersReduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
      if (prefersReduced) return;
      const layer = $('#confetti-layer');
      const colors = ['#ff2a9d', '#b347ff', '#ffd700', '#00e5ff', '#ffffff'];
      const count = Math.min(120, Math.floor(window.innerWidth / 10));
      for (let i = 0; i < count; i++) {
        const el = document.createElement('div');
        el.className = 'confetti';
        el.style.left = `${Math.random() * 100}vw`;
        el.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
        el.style.borderRadius = Math.random() > 0.5 ? '50%' : '0';
        el.style.width = `${6 + Math.random() * 10}px`;
        el.style.height = `${6 + Math.random() * 10}px`;
        el.style.animation = `fall ${3 + Math.random() * 4}s linear forwards`;
        el.style.animationDelay = `${Math.random() * 2}s`;
        layer.appendChild(el);
      }
      setTimeout(() => { layer.innerHTML = ''; }, 9000);
    }

    /* ---------- Countdown ---------- */
    function initCountdown() {
      const now = new Date();
      const currentYear = now.getFullYear();
      const isJuly7 = now.getMonth() === 6 && now.getDate() === 7;
      const targetYear = (now.getMonth() < 6 || (now.getMonth() === 6 && now.getDate() < 7)) ? currentYear : currentYear + 1;
      const target = new Date(targetYear, 6, 7, 0, 0, 0); // July 7 at midnight

      const container = $('#countdown-content');
      const dateLabel = $('#countdown-date');
      dateLabel.textContent = `Counting down to July 7, ${targetYear}`;

      if (isJuly7) {
        container.innerHTML = '<div class="birthday-message">IT\'S YOUR BIRTHDAY!</div>';
        return;
      }

      const pad = (n) => String(n).padStart(2, '0');
      function tick() {
        const diff = target - new Date();
        if (diff <= 0) {
          container.innerHTML = '<div class="birthday-message">IT\'S YOUR BIRTHDAY!</div>';
          return;
        }
        const days = Math.floor(diff / (1000 * 60 * 60 * 24));
        const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
        const minutes = Math.floor((diff / (1000 * 60)) % 60);
        const seconds = Math.floor((diff / 1000) % 60);
        $('#days').textContent = pad(days);
        $('#hours').textContent = pad(hours);
        $('#minutes').textContent = pad(minutes);
        $('#seconds').textContent = pad(seconds);
      }
      tick();
      setInterval(tick, 1000);
    }

    /* ---------- Photos ---------- */
    function initPhotos() {
      const grid = $('#photo-grid');
      if (!CONFIG.photos || CONFIG.photos.length === 0) {
        grid.innerHTML = '<div class="photo-tile photo-placeholder">Add photo filenames to the <strong>CONFIG.photos</strong> array, then drop the image files in the repo root.</div>';
        return;
      }
      grid.innerHTML = CONFIG.photos.map(file => `
        <div class="photo-tile">
          <img src="${escapeHtml(file)}" alt="Photo of ${escapeHtml(CONFIG.name)}" loading="lazy">
        </div>
      `).join('');
    }

    /* ---------- NATTOK ---------- */
    function initNattok() {
      const feed = $('#video-feed');
      if (!CONFIG.nattokVideos || CONFIG.nattokVideos.length === 0) {
        feed.innerHTML = `
          <div class="nattok-placeholder">
            <strong>NATTOK feed is empty</strong>
            <p>Add videos to the <strong>CONFIG.nattokVideos</strong> array as <code>{ file: 'video.mp4', caption: '...' }</code>, then drop the .mp4 files in the repo root.</p>
          </div>
        `;
        return;
      }

      feed.innerHTML = CONFIG.nattokVideos.map((entry, index) => `
        <div class="video-slide" data-index="${index}">
          <video src="${escapeHtml(entry.file)}" loop playsinline muted preload="metadata" aria-label="NATTOK video ${index + 1}"></video>
          <div class="mute-badge" id="mute-${index}">Muted</div>
          <div class="video-caption">${escapeHtml(entry.caption || '')}</div>
        </div>
      `).join('');

      const slides = $$('.video-slide', feed);
      const videos = $$('video', feed);
      const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          const video = entry.target.querySelector('video');
          if (!video) return;
          if (entry.isIntersecting && entry.intersectionRatio >= 0.65) {
            video.play().catch(() => {});
          } else {
            video.pause();
          }
        });
      }, { root: feed, threshold: [0.5, 0.65, 0.8] });

      slides.forEach(slide => observer.observe(slide));

      videos.forEach(video => {
        video.addEventListener('click', () => {
          video.muted = !video.muted;
          const badge = video.parentElement.querySelector('.mute-badge');
          if (badge) badge.textContent = video.muted ? 'Muted' : 'Sound on';
        });
      });
    }

    /* ---------- Socials ---------- */
    function initSocials() {
      const pills = $('#social-pills');
      const embeds = $('#embed-grid');
      const hasIg = CONFIG.instagramHandle && CONFIG.instagramHandle !== 'INSTAGRAM HANDLE';
      const hasTt = CONFIG.tiktokHandle && CONFIG.tiktokHandle !== 'TIKTOK HANDLE';

      pills.innerHTML = '';
      if (hasIg) {
        pills.innerHTML += `<a class="social-pill instagram" href="https://www.instagram.com/${encodeURIComponent(CONFIG.instagramHandle)}/" target="_blank" rel="noopener noreferrer">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 2.16c3.2 0 3.58.01 4.85.07 1.17.05 1.8.25 2.23.41.56.22.96.48 1.38.9.42.42.68.82.9 1.38.16.42.36 1.05.41 2.23.06 1.27.07 1.65.07 4.85s-.01 3.58-.07 4.85c-.05 1.17-.25 1.8-.41 2.23-.22.56-.48.96-.9 1.38-.42.42-.82.68-1.38.9-.42.16-1.05.36-2.23.41-1.27.06-1.65.07-4.85.07s-3.58-.01-4.85-.07c-1.17-.05-1.8-.25-2.23-.41-.56-.22-.96-.48-1.38-.9-.42-.42-.68-.82-.9-1.38-.16-.42-.36-1.05-.41-2.23-.06-1.27-.07-1.65-.07-4.85s.01-3.58.07-4.85c.05-1.17.25-1.8.41-2.23.22-.56.48-.96.9-1.38.42-.42.82-.68 1.38-.9.42-.16 1.05-.36 2.23-.41 1.27-.06 1.65-.07 4.85-.07M12 0C8.74 0 8.33.01 7.05.07 5.78.13 4.9.33 4.14.63c-.78.3-1.44.71-2.1 1.37C1.38 2.66.97 3.32.67 4.1.33 4.9.13 5.78.07 7.05.01 8.33 0 8.74 0 12s.01 3.67.07 4.95c.06 1.27.26 2.15.56 2.91.3.78.71 1.44 1.37 2.1.66.66 1.32 1.07 2.1 1.37.76.3 1.64.5 2.91.56C8.33 23.99 8.74 24 12 24s3.67-.01 4.95-.07c1.27-.06 2.15-.26 2.91-.56.78-.3 1.44-.71 2.1-1.37.66-.66 1.07-1.32 1.37-2.1.3-.76.5-1.64.56-2.91.06-1.28.07-1.69.07-4.95s-.01-3.67-.07-4.95c-.06-1.27-.26-2.15-.56-2.91-.3-.78-.71-1.44-1.37-2.1C21.34 1.38 20.68.97 19.9.67c-.76-.3-1.64-.5-2.91-.56C15.67.01 15.26 0 12 0zm0 5.84a6.16 6.16 0 1 0 0 12.32 6.16 6.16 0 0 0 0-12.32zM12 16a4 4 0 1 1 0-8 4 4 0 0 1 0 8zm7.85-10.4a1.44 1.44 0 1 1 0 2.88 1.44 1.44 0 0 1 0-2.88z"/></svg>
          Instagram @${escapeHtml(CONFIG.instagramHandle)}
        </a>`;
      }
      if (hasTt) {
        pills.innerHTML += `<a class="social-pill tiktok" href="https://www.tiktok.com/@${encodeURIComponent(CONFIG.tiktokHandle)}" target="_blank" rel="noopener noreferrer">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M19.59 6.69a4.83 4.83 0 0 1-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 0 1-5.2 1.74 2.89 2.89 0 0 1 2.31-4.64 2.93 2.93 0 0 1 .88.13V9.4a6.84 6.84 0 0 0-1-.05A6.33 6.33 0 0 0 5 20.1a6.34 6.34 0 0 0 10.86-4.43v-6.95a8.16 8.16 0 0 0 4.77 1.52v-3.4a4.85 4.85 0 0 1-1-.1z"/></svg>
          TikTok @${escapeHtml(CONFIG.tiktokHandle)}
        </a>`;
      }

      const hasIgPosts = CONFIG.instagramPosts && CONFIG.instagramPosts.length > 0;
      const hasTtPosts = CONFIG.tiktokPosts && CONFIG.tiktokPosts.length > 0;

      if (!hasIgPosts && !hasTtPosts) {
        embeds.innerHTML = '<div class="embed-note">No embedded posts yet. Paste Instagram URLs into <strong>CONFIG.instagramPosts</strong> and TikTok URLs into <strong>CONFIG.tiktokPosts</strong>.</div>';
      } else {
        let html = '';
        if (hasIgPosts) {
          html += CONFIG.instagramPosts.map(url => `
            <blockquote class="instagram-media" data-instgrm-permalink="${escapeHtml(url)}" data-instgrm-version="14" style="width:100%;max-width:540px;min-width:326px;background:#FFF;border:0;border-radius:3px;box-shadow:0 0 1px 0 rgba(0,0,0,0.5),0 1px 10px 0 rgba(0,0,0,0.15);margin:0 auto;">
              <a href="${escapeHtml(url)}" target="_blank" rel="noopener noreferrer">View this post on Instagram</a>
            </blockquote>
          `).join('');
        }
        if (hasTtPosts) {
          html += CONFIG.tiktokPosts.map(url => `
            <blockquote class="tiktok-embed" cite="${escapeHtml(url)}" data-video-id="" style="max-width:605px;min-width:325px;">
              <section><a target="_blank" rel="noopener noreferrer" href="${escapeHtml(url)}">View on TikTok</a></section>
            </blockquote>
          `).join('');
        }
        embeds.innerHTML = html;

        // Load official embed scripts
        if (hasIgPosts) {
          const igScript = document.createElement('script');
          igScript.async = true;
          igScript.src = 'https://www.instagram.com/embed.js';
          document.body.appendChild(igScript);
        }
        if (hasTtPosts) {
          const ttScript = document.createElement('script');
          ttScript.async = true;
          ttScript.src = 'https://www.tiktok.com/embed.js';
          document.body.appendChild(ttScript);
        }
      }
    }

    /* ---------- Utility ---------- */
    function escapeHtml(str) {
      if (str == null) return '';
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    /* ---------- Boot ---------- */
    document.addEventListener('DOMContentLoaded', () => {
      createConfetti();
      initCountdown();
      initPhotos();
      initNattok();
      initSocials();
    });
  </script>
</body>
</html>
